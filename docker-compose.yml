  ksqldb-server:
    image: confluentinc/cp-ksqldb-server:7.5.0
    container_name: ksqldb-server
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      # kafka-connect:
        # condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka:9092 
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KSQL_KSQL_SERVICE_ID: ksql_server_ 
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    
  ksqldb-cli:
    image: confluentinc/cp-ksqldb-cli:7.5.0
    container_name: ksqldb-cli
    depends_on:
      # kafka:
      #   condition: service_healthy
      # schema-registry:
      #   condition: service_healthy
      # kafka-connect:
      #   condition: service_healthy
      ksqldb-server:
        condition: service_healthy
    entrypoint: /bin/sh
    tty: true
    


  # --- BBDD ---
  postgres:
    image: postgres:15
    container_name: postgres
    healthcheck: # PETICION DE SALUD (si responde correctamente)
      test: ["CMD-SHELL", "pg_isready -U admin -d vuelos_asturias_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: vuelos_asturias_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d #link con scripts .sql para creacion de tablas de bbdd


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      # kafka-connect:
        # condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081


  producer:
    build:
      context: .
      dockerfile: ./src/producer_vuelos/Dockerfile.producer
    container_name: producer-vuelos
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      # kafka-connect:
      #   condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "pgrep", "-f", "get_vuelos.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    environment:
      KAFKA_BROKER: "kafka:9092"   


  # clean-routes-ovd:
  #   build:
  #     context: .
  #     dockerfile: ./_data/pandas/Dockerfile.clean
  #   volumes:
  #     - ./_data/pandas:/app/output # salida .csv


  scraper-aena:
    build:
      context: .
      dockerfile: _data/scraper/Dockerfile.scraper
    container_name: scraper-aena
    volumes:
      - ./_data/scraper:/app/output

  dic-rutas:
    build:
      context: .
      dockerfile: src/dic_rutas/Dockerfile.dic_rutas

    container_name: dic-rutas

    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      producer:
        condition: service_healthy

    environment:
      - KAFKA_BROKER=kafka:9092

    healthcheck:
      test: ["CMD", "pgrep", "-f", "dic_rutas.py"]
      interval: 30s
      timeout: 10s
      retries: 3

      

# VOLUMENES
volumes:
  kafka_data:
  postgres_data:


 

